abstract: The utilization of aperiodic flickering visual stimuli under the form of code-modulated Visual Evoked Potentials
  (c-VEP) represents a pivotal advancement in the field of reactive Brain–Computer Interface (rBCI). This study introduces
  Burst c-VEP, an innovative variant involving short bursts of aperiodic visual flashes at 2-4 flashes per second. The proposed
  burst c-VEP sequences exhibited higher accuracy (90.5%-95.6%) compared to m-sequence counterparts (71.4%-85.0%) with mean
  selection time of 1.5s. Reducing stimulus intensity to 40% amplitude depth only slightly decreased accuracy to 94.2% while
  substantially improving user experience. The collected dataset and CNN architecture implementation are shared through open-access
  repositories.
